<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thực đơn - Bún nước Cô Lệ</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/menu.css">
</head>
<body>

  <!-- HEADER -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #5b3920;">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/index.html">
      <img src="/public/logo.png" alt="Logo quán" height="70">
      <span id="current-page" class="ms-2 d-lg-none fw-bold text-white"></span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="/index.html" data-title="GIỚI THIỆU">GIỚI THIỆU</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/html/menu.html" data-title="THỰC ĐƠN">THỰC ĐƠN</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/html/contact.html" data-title="LIÊN HỆ">LIÊN HỆ</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

    <!-- MAIN -->
  <main class="py-5 bg2">
    <div class="container menu-wrapper position-relative">
      <!-- Header menu -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold text-brown">Thực đơn</h1>
        <div class="cart-box p-3 rounded-3 border border-2 text-center" style="background-color: #f8f8f8;">
          <button class="btn fw-bold mb-2" style="background-color: #5B3920; color: white;">🛒 ĐẶT MÓN</button>
          <p class="m-0">Tổng: <span>0đ</span></p>
        </div>
      </div>

      <!-- LOADING -->
      <div id="loading" class="loading-overlay d-none">
        <div class="spinner-border text-brown" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Đang tải...</span>
        </div>
        <p class="mt-3 fw-bold text-brown">Đang tải dữ liệu...</p>
      </div>

      <!-- MÓN ĂN CHÍNH -->
      <section class="menu-section mb-5">
        <h2 class="fw-bold mb-3 text-brown">Món ăn chính</h2>
        <div class="row g-4" id="menu-list"></div>
      </section>
    </div>
  </main>


  <!-- FOOTER -->
  <footer class="text-center text-white py-3" style="background-color:#5b3920;">
    <p class="m-0">© 2025 Bún nước Cô Lệ - Bún nước Tôm Bò - Bún nước Nguyễn Công Hoan - Bún nước Phú Nhuận</p>
  </footer>

  <!-- Modal thông báo -->
  <div class="modal fade" id="orderModal" tabindex="-1" aria-labelledby="orderModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="orderModalLabel">Thông báo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body">
          Tính năng đang phát triển. <br/>
          Nếu quý khách muốn đặt hàng, vui lòng liên hệ tại đây.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <a href="/html/contact.html" class="btn btn-primary">Liên hệ</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script type="module" src="../js/menu-item.js"></script>
  <script type="module" src="../js/menu-effect.js"></script>
  <script src="/js/layout.js"></script>
</body>
</html>
