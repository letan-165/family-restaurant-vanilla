<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đơn hàng của bạn - Bún nước Cô Lệ</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="icon" href="/public/banner.png" type="image/png" />
    <link rel="stylesheet" href="/css/layout.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div id="header"></div>

    <!-- NỘI DUNG CHÍNH -->
    <main class="bg2 py-5">
      <h2 class="text-center mb-4 text-brown fw-bold">ĐƠN HÀNG CỦA BẠN</h2>

      <!-- TABS -->
      <ul
        class="nav nav-pills mb-3 justify-content-center"
        id="statusTabs"
        role="tablist"
      >
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-status="PENDING">
            Đang chờ
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-status="CONFIRMED">Đã xác nhận</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-status="COMPLETED">Hoàn tất</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-status="CANCELLED">Đã hủy</button>
        </li>
      </ul>

      <!-- LOADING -->
      <div id="loading" class="text-center d-none mb-3">
        <div class="spinner-border text-brown" role="status"></div>
        <p class="mt-2 text-brown fw-semibold">Đang tải đơn hàng...</p>
      </div>

      <!-- THÔNG BÁO -->
      <div id="message" class="text-center text-muted fw-semibold my-4"></div>

      <!-- DANH SÁCH ĐƠN HÀNG -->
      <div class="container" style="max-width: 1300px">
        <div id="order-list" class="row g-4"></div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/layout.js"></script>
    <script type="module" src="/js/order.js"></script>
  </body>
</html>
