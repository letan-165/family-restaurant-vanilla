<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên hệ - Bún nước Cô Lệ</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/layout.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div id="header"></div>

    <!-- MAIN -->
    <main class="bg2 py-5 bg-light">
      <div class="container text-center mb-4">
        <h2 class="fw-bold">* LIÊN HỆ *</h2>
        <p>
          Mọi thắc mắc về chất lượng, dịch vụ, vui lòng liên hệ thông tin dưới
          đây để được hỗ trợ.
        </p>
      </div>

      <div class="container">
        <div class="row g-4 justify-content-center">
          <!-- Map / Banner -->
          <div class="col-12 col-md-6">
            <div class="card border-2 rounded-3 overflow-hidden">
              <img
                src="/public/location.png"
                class="card-img-top"
                alt="Bản đồ quán"
                style="height: 350px; object-fit: cover"
              />
            </div>
          </div>

          <!-- Contact info -->
          <div class="col-12 col-md-4">
            <div class="card p-3 border-2 rounded-3">
              <h4 class="fw-bold mb-2">Địa chỉ cụ thể:</h4>
              <p>41 Nguyễn Công Hoan, Phường Cầu Kiệu, TP.HCM</p>

              <h4 class="fw-bold mb-2">Liên lạc:</h4>
              <p>SĐT / Zalo: 0903083108</p>
              <p>Email: *</p>

              <h4 class="fw-bold mb-2">Nền tảng:</h4>
              <div class="d-flex gap-3 flex-wrap">
                <a href="https://www.tiktok.com/@bunnuoccole" target="_blank">
                  <img
                    src="/public/tiktok.png"
                    alt="TikTok"
                    class="img-fluid"
                    style="width: 50px; height: 50px; object-fit: contain"
                  />
                </a>
                <a
                  href="https://shopeefood.vn/ho-chi-minh/bun-nuoc-co-le-bun-tom-bo-nguyen-cong-hoan.cytbtd"
                  target="_blank"
                >
                  <img
                    src="/public/shopeefood.png"
                    alt="ShopeeFood"
                    class="img-fluid"
                    style="width: 50px; height: 50px; object-fit: contain"
                  />
                </a>
                <a
                  href="https://food.be.com.vn/resto?id=121053&name=B%C3%BAn+N%C6%B0%E1%BB%9Bc+C%C3%B4+L%E1%BB%87+-+Nguy%E1%BB%85n+C%C3%B4ng+Hoan"
                  target="_blank"
                >
                  <img
                    src="/public/befood.png"
                    alt="beFood"
                    class="img-fluid"
                    style="width: 50px; height: 50px; object-fit: contain"
                  />
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/layout.js"></script>
  </body>
</html>
