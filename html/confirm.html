<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xác nhận đơn hàng - Bún nước Cô Lệ</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/menu.css" />
  </head>
  <body>
    <!-- HEADER -->
    <div id="header"></div>

    <!-- MAIN -->
    <main class="py-5 bg2">
      <div class="container">
        <h1 class="fw-bold text-brown mb-4 text-center">Xác nhận đơn hàng</h1>

        <div class="row g-5">
          <!-- Form thông tin người nhận -->
          <div class="col-lg-5">
            <div class="card shadow-sm border-0">
              <div class="card-header bg-brown text-white fw-bold">
                Thông tin người nhận
              </div>
              <div class="card-body">
                <form id="confirm-form">
                  <div class="mb-3">
                    <label for="name" class="form-label fw-bold"
                      >Tên người nhận</label
                    >
                    <input
                      type="text"
                      id="name"
                      class="form-control"
                      placeholder="Nhập tên"
                      required
                    />
                  </div>

                  <div class="mb-3">
                    <label for="phone" class="form-label fw-bold"
                      >Số điện thoại</label
                    >
                    <input
                      type="tel"
                      id="phone"
                      class="form-control"
                      placeholder="Nhập số điện thoại"
                      required
                      pattern="[0-9]{10,11}"
                    />
                  </div>

                  <div class="mb-3">
                    <label for="address" class="form-label fw-bold"
                      >Địa chỉ nhận hàng</label
                    >
                    <textarea
                      id="address"
                      class="form-control"
                      rows="3"
                      placeholder="Nhập địa chỉ"
                      required
                    ></textarea>
                  </div>

                  <button
                    type="submit"
                    class="btn w-100 fw-bold"
                    style="background-color: #5b3920; color: white"
                  >
                    Xác nhận đặt hàng
                  </button>
                </form>
              </div>
            </div>
          </div>

          <!-- Danh sách món đã chọn -->
          <div class="col-lg-7">
            <div class="card shadow-sm border-0">
              <div class="card-header bg-brown text-white fw-bold">
                Danh sách món đã chọn
              </div>
              <div class="card-body" id="order-list">
                <p class="text-muted">Chưa có món nào được chọn.</p>
              </div>
              <div class="card-footer fw-bold text-end">
                Tổng cộng: <span id="order-total" class="text-brown">0đ</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script type="module" src="/js/layout.js"></script>
    <script type="module" src="/js/confirm.js"></script>
  </body>
</html>
